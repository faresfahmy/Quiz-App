<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
 <body>
  <div class="quiz-app">
    <div class="choose-exam">
      <span class="html-exam">HTML</span>
      <span class="css-exam">CSS</span>
      <span class="js-exam">JavaScript</span>
    </div>
    <div class="quiz-info">
      <div class="categery">Categery : <span>HTML</span></div>
      <div class="count">Questions Count : <span></span></div>
    </div>
    <div class="quiz-area"></div>
    <div class="answer-area"></div>
    <button class="submit-answer">Submit Answer</button>
    <div class="bullets">
      <div class="spans"></div>
      <div class="countdown">
        <span class="minutes">
      </div>
    </div>
    <div class="result"></div>
  </div>
  <script src="main.js"></script>
 </body>

</html>
